name: Build Android APK

# Déclenche le workflow :
# - à chaque push sur la branche main/master
# - à chaque pull request
# - manuellement depuis l'onglet "Actions" de GitHub
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Vérifier l'installation de Flutter
        run: flutter doctor -v

      - name: Installer les dépendances
        run: flutter pub get

      - name: Générer les icônes de lancement à partir du logo
        run: dart run flutter_launcher_icons

      - name: Analyser le code (optionnel, informatif)
        run: flutter analyze || true

      - name: Compiler l'APK en mode release
        run: flutter build apk --release

      - name: Compiler aussi des APK séparés par architecture (plus légers)
        run: flutter build apk --release --split-per-abi

      - name: Uploader l'APK universel comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: ny-tahiriko-apk-universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Uploader les APK par architecture comme artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ny-tahiriko-apk-par-architecture
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

      # Optionnel : crée automatiquement une "Release" GitHub avec l'APK
      # attaché, uniquement lors d'un push sur main/master (pas sur les PR).
      - name: Créer une release GitHub avec l'APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Ny Tahiriko — build automatique #${{ github.run_number }}"
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
